      repo: self
      artifactFeeds: ${{ parameters.artifactFeed}}
      scriptEnvVariables: |
        export ARTIFACTS_CREDENTIAL_PROVIDER_RID=linux-x64
      expectedCredentialProviderVersion: 'Microsoft.linux-x64.NuGet.CredentialProvider'
- job: LinuxInstallNet8linuxarm64
